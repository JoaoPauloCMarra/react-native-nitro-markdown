name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to validate against package.json
        required: false
        default: v0.7.0
      npm_dist_tag:
        description: npm dist-tag to use for dry-run validation
        required: false
        default: latest
      dry_run:
        description: Run npm publish as a dry run
        required: false
        default: "true"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name || inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

env:
  BUN_VERSION: "1.3.14"
  NODE_VERSION: "24"
  CC: clang
  CXX: clang++

jobs:
  publish:
    name: Publish react-native-nitro-markdown to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install C++ coverage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const pkg = JSON.parse(
            fs.readFileSync("packages/react-native-nitro-markdown/package.json", "utf8"),
          );
          const expected = `v${pkg.version}`;
          if (process.env.RELEASE_TAG !== expected) {
            console.error(
              `Release tag ${process.env.RELEASE_TAG} does not match package version ${expected}`,
            );
            process.exit(1);
          }
          NODE

      - name: Select npm dist tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "NPM_DIST_TAG=${{ inputs.npm_dist_tag }}" >> "$GITHUB_ENV"
          elif [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "NPM_DIST_TAG=next" >> "$GITHUB_ENV"
          else
            echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Publish package
        run: |
          args=(--yes --tag="$NPM_DIST_TAG")
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" != "false" ]; then
            args+=(--dry-run)
          fi
          node scripts/publish.js "${args[@]}"
